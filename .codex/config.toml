# Project-level Codex configuration.
# Official docs:
# - https://developers.openai.com/codex/config-basic
# - https://developers.openai.com/codex/config-reference
# This file should only contain repository-shareable defaults.
# Do not put account-specific, absolute-path, or secret values here.

# Default model for engineering execution and code changes.
model = "gpt-5.3-codex"

# Reduce approval interruptions while relying on sandbox boundaries.
approval_policy = "never"

# Allow read/write access within the workspace only.
sandbox_mode = "workspace-write"

# Allow live web search for official docs, dependencies, and fresh context.
web_search = "live"

# High reasoning effort for multi-step tasks, refactors, and debugging.
model_reasoning_effort = "high"

# Verbose outputs to make reviews and decisions easier to follow.
model_verbosity = "high"

# Pragmatic interaction style focused on executable outcomes.
personality = "pragmatic"

[shell_environment_policy]
# Inherit shell environment variables for maximum compatibility.
inherit = "all"

[sandbox_workspace_write]
# Allow network access in workspace-write mode.
# Set this to false first if you want a stricter security posture later.
network_access = true

# Keep default KEY/SECRET/TOKEN-like variables available to subprocesses.
# Convenient for GitHub/Vercel/database tooling, but broader secret exposure risk.
# For stricter behavior, disable this or switch to include_only allowlists.
ignore_default_excludes = true

[tui]
# Enable terminal notifications for an approval_policy = "never" workflow.
notifications = true

# Auto-select the best supported notification method (OSC, then BEL fallback).
notification_method = "auto"

[history]
# Persist local history for traceability and troubleshooting.
persistence = "save-all"

# History size cap: 500 MiB.
max_bytes = 524288000

# MCP servers for this repository (aligned with AGENTS.md).
# Current shared set intentionally excludes Playwright MCP.
# Browser automation remains owned by the repository Playwright test suite.
[mcp_servers.context7]
command = "bunx"
args = ["@upstash/context7-mcp@latest"]

[mcp_servers.chrome-devtools]
command = "bunx"
args = ["chrome-devtools-mcp@latest"]

[mcp_servers.shadcn]
command = "bunx"
args = ["shadcn@latest", "mcp"]

[features]
# Keep shell snapshots for execution context and debugging.
shell_snapshot = true
